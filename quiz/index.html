<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="shortcut icon" href="imagens/LogoGirassolwebp.webp" type="image/x-icon">
</head>

<body>

    <header id="cabecalho">

        <h1>Quiz Teste</h1>

        <div><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNyekSMnEPalJZ7TJ-2KKcgxSnM92tpMofiA&s" alt="muffin" id="mascote"></div>

    </header>

    <main id="princ">

        <div id="pergunta">
            
            <p id="questao">?</p>

            <div id="alternat">
                <p class="opcoes">
                    <button class="botao" onclick="selecionarOpcao(0)" id="b0">
                        <span class="letra">A</span>
                        <span class="alter" id="a1"></span>
                    </button>
                </p>

                <p class="opcoes">
                    <button class="botao" onclick="selecionarOpcao(1)" id="b1">
                        <span class="letra">B</span>
                        <span class="alter" id="a2"></span>
                    </button>
                </p>

                <p class="opcoes">
                    <button class="botao" onclick="selecionarOpcao(2)" id="b2">
                        <span class="letra">C</span>
                        <span class="alter" id="a3"></span>
                    </button>
                </p>

                <p class="opcoes">
                    <button class="botao" onclick="selecionarOpcao(3)" id="b3">
                        <span class="letra">D</span>
                        <span class="alter" id="a4"></span>
                    </button>
                </p>
                
            </div>

            <div id="paiMascote">
                <img src="imagens/mascote1.jpg" alt="" id="mascote1" class="mascotePonto">
                
                <img src="imagens/mascote2.jpg" alt="" id="mascote2" class="mascotePonto">

                <img src="imagens/mascote3.jpg" alt="" id="mascote3" class="mascotePonto">
            </div>

            <div id="paiBotoes">
                <button type="submit" id="verificar" onclick="verificar()" class="b">Verificar</button>

            
                <button type="submit" id="recomecar" class="b">
                    <a href="index.html">Recomeçar</a>
                </button>
                

                <button type="submit" id="btn" onclick="enviar()" class="b">Próxima</button>



            </div>
           
            

        </div>


       
    </main>
    
    <footer id="pe">

        &copy; 

    </footer>



    <script src="js/js.js"></script>
</body>

</html>
